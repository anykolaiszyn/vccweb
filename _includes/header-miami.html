    </a>

    <nav id="main-navigation" class="main-nav" aria-label="Vice City navigation">
      <ul>
        <li><a href="{{ '/vice-city/' | relative_url }}"{% if page.url == '/vice-city/' %} aria-current="page"{% endif %}>Home</a></li>
        <li><a href="{{ '/vice-city/shop' | relative_url }}"{% if page.url contains '/vice-city/shop' %} aria-current="page"{% endif %}>The Humidor</a></li>
        <li><a href="{{ '/vice-city/events' | relative_url }}"{% if page.url contains '/vice-city/events' %} aria-current="page"{% endif %}>Events</a></li>

        <li><a href="{{ '/vice-city/learn' | relative_url }}"{% if page.url contains '/vice-city/learn' %} aria-current="page"{% endif %}>Learn</a></li>

        <li><a href="{{ '/vice-city/contact' | relative_url }}"{% if page.url contains '/vice-city/contact' %} aria-current="page"{% endif %}>Contact</a></li>
        <li><a href="{{ '/terms' | relative_url }}"{% if page.url contains '/terms' or page.url contains '/privacy' or page.url contains '/shipping' or page.url contains '/refund' %} aria-current="page"{% endif %}>Policies</a></li>
        <li><a href="{{ '/' | relative_url }}" title="Switch to the Black Leaf Bounty experience">Switch Experience</a></li>
