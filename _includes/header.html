<header class="site-header">
  <div class="container header-flex">
    <a href="{{ '/' | relative_url }}" class="logo-link" aria-label="Vice City Cigars home">
      <img src="{{ '/assets/img/vcclogoclear.png' | relative_url }}" alt="Vice City Cigars logo" class="site-logo">
    </a>
    
    <button class="mobile-menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="main-navigation">
      <span class="hamburger"></span>
      <span class="hamburger"></span>
      <span class="hamburger"></span>
    </button>
    
    <nav id="main-navigation" class="main-nav" aria-label="Main navigation">
      <ul>
        <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Home</a></li>
        <li><a href="{{ '/about' | relative_url }}"{% if page.url contains '/about' %} aria-current="page"{% endif %}>About</a></li>
        <li><a href="{{ '/services' | relative_url }}"{% if page.url contains '/services' %} aria-current="page"{% endif %}>Services</a></li>
        <li><a href="{{ '/shop' | relative_url }}"{% if page.url contains '/shop' %} aria-current="page"{% endif %}>Shop Update</a></li>
        <li><a href="{{ '/events' | relative_url }}"{% if page.url contains '/events' %} aria-current="page"{% endif %}>Events</a></li>
        <li><a href="{{ '/black-leaf-bounty' | relative_url }}"{% if page.url contains '/black-leaf-bounty' %} aria-current="page"{% endif %}>Black Leaf Bounty</a></li>
        <li><a href="{{ '/contact' | relative_url }}"{% if page.url contains '/contact' %} aria-current="page"{% endif %}>Contact</a></li>
      </ul>
    </nav>

  </div>
</header>
