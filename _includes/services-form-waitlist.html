<form id="vcn-waitlist" data-async-form
      data-loading-text="Adding you to the list..."
      data-success-message="You're on the Guest List. We'll let you know when tickets drop."
      data-error-message="Something went wrong. Try again or email vccigar@gmail.com."
      action="https://formspree.io/f/mwpnagkv" method="POST" autocomplete="on">
  <input type="text" name="_gotcha" class="visually-hidden" tabindex="-1" autocomplete="off" aria-hidden="true" aria-label="Ignore this field">
  <input type="hidden" name="_subject" value="Vice City Nights Guest List">
  <input type="hidden" name="form-name" value="vcn-waitlist">

  <label for="vcn-first-name">First Name *</label>
  <input type="text" id="vcn-first-name" name="first-name" required aria-required="true" autocomplete="given-name">

  <label for="vcn-email">Email *</label>
  <input type="email" id="vcn-email" name="email" required aria-required="true" autocomplete="email">

  <label for="vcn-role">Which best describes you?</label>
  <select id="vcn-role" name="role">
    <option value="">Select...</option>
    <option>Cigar enthusiast</option>
    <option>First-timer</option>
    <option>I want to bring a group</option>
    <option>I'm interested in sponsoring</option>
  </select>

  <button type="submit" class="btn btn-primary">Join the Guest List</button>
</form>
